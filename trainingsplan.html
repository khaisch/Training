<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f000;
    --accent2: #7fff6e;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4d4d;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* VIEWS */
  .view { display: none; padding: 0 0 80px; }
  .view.active { display: block; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header .badge {
    background: var(--accent); color: #000;
    font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  /* BOTTOM NAV */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 12px 0; font-size: 10px; font-family: 'DM Sans', sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: color 0.15s;
  }
  .nav button.active { color: var(--accent); }
  .nav button svg { width: 22px; height: 22px; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 12px 16px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* EXERCISE ROW */
  .exercise-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .exercise-item:last-child { border-bottom: none; }
  .exercise-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .exercise-hint { font-size: 11px; color: var(--muted); margin-bottom: 10px; font-family: 'DM Mono', monospace; }

  /* SETS */
  .sets-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .set-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .set-chip.done {
    background: rgba(200,240,0,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .set-chip .check { font-size: 10px; }

  /* SESSION HEADER */
  .session-bar {
    margin: 16px 16px 0;
    background: var(--accent);
    color: #000;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .session-bar .label { font-size: 13px; font-weight: 600; }
  .session-bar .date { font-size: 12px; font-family: 'DM Mono', monospace; opacity: 0.7; }
  .session-bar button {
    background: rgba(0,0,0,0.15); border: none; color: #000;
    padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  /* INPUTS */
  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }

  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  /* BUTTONS */
  .btn {
    display: block; width: 100%;
    background: var(--accent); color: #000;
    border: none; border-radius: var(--radius);
    padding: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn.secondary {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.danger { background: var(--danger); color: #fff; }

  .btn-sm {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-sm.accent { background: var(--accent); color: #000; border: none; }

  /* MODAL */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .sheet h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }

  /* HISTORY */
  .history-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 6px; }
  .history-exercises { font-size: 13px; color: var(--text); line-height: 1.6; }
  .history-volume {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--accent); margin-top: 4px;
  }

  /* PROGRESS CHART */
  .chart-wrap { padding: 16px; }
  .chart-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .chart-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); width: 80px; flex-shrink: 0; }
  .chart-bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .chart-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s; }
  .chart-val { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); width: 50px; text-align: right; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty .icon { font-size: 36px; margin-bottom: 12px; }

  /* RULES BOX */
  .rules-box {
    margin: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .rules-box h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
  .rules-box p { font-size: 12px; color: var(--muted); line-height: 1.6; font-family: 'DM Mono', monospace; }

  /* SECTION TITLE */
  .section-title {
    padding: 16px 16px 6px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--muted);
  }

  .tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .del-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; padding: 4px;
  }
  .del-btn:hover { color: var(--danger); }

  .breathing-note {
    margin: 0 16px 12px;
    background: rgba(200,240,0,0.06);
    border: 1px solid rgba(200,240,0,0.2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: rgba(200,240,0,0.8);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
</style>
</head>
<body>

<!-- VIEW: TRAINING -->
<div class="view active" id="view-train">
  <div class="header">
    <h1>Training</h1>
    <span class="badge" id="today-badge"></span>
  </div>

  <div class="rules-box">
    <h3>Trainingsregeln</h3>
    <p>
      Wdh: 8–12 · mind. 8, max. 12<br>
      &gt;3×12 → Gewicht erhöhen<br>
      Pause: 60–90 Sek.<br>
      Atmung: AUS bei Überwindung · EIN bei Rückführung
    </p>
  </div>

  <div class="breathing-note">⚡ WARM-UP: 8–12 Minuten</div>

  <div id="exercise-list"></div>

  <div style="padding: 0 16px;">
    <button class="btn" onclick="saveSession()">Training speichern ✓</button>
    <div style="height:10px;"></div>
    <button class="btn secondary" onclick="showSheet('add-exercise')">+ Übung hinzufügen</button>
  </div>
</div>

<!-- VIEW: HISTORY -->
<div class="view" id="view-history">
  <div class="header">
    <h1>Verlauf</h1>
  </div>
  <div id="history-list"></div>
</div>

<!-- VIEW: PROGRESS -->
<div class="view" id="view-progress">
  <div class="header">
    <h1>Fortschritt</h1>
  </div>
  <div id="progress-content"></div>
</div>

<!-- VIEW: SETTINGS -->
<div class="view" id="view-settings">
  <div class="header">
    <h1>Übungen</h1>
  </div>
  <div id="settings-list"></div>
  <div style="padding: 12px 16px;">
    <button class="btn secondary" onclick="showSheet('add-exercise')">+ Neue Übung</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="active" onclick="switchView('train', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M6 12h12"/></svg>
    Training
  </button>
  <button onclick="switchView('history', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Verlauf
  </button>
  <button onclick="switchView('progress', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Fortschritt
  </button>
  <button onclick="switchView('settings', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    Übungen
  </button>
</nav>

<!-- SHEET: ADD EXERCISE -->
<div class="overlay" id="sheet-add-exercise" onclick="closeSheetOnBg(event, 'add-exercise')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Neue Übung</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="new-name" placeholder="z.B. Shoulder Press">
    </div>
    <div class="form-group">
      <label>Einstellung / Hinweis</label>
      <input type="text" id="new-hint" placeholder="z.B. Sitz: 2">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Sätze</label>
        <input type="number" id="new-sets" value="3" min="1" max="10">
      </div>
      <div class="form-group">
        <label>Gewicht (kg)</label>
        <input type="number" id="new-weight" step="2.5" placeholder="0">
      </div>
      <div class="form-group">
        <label>Wdh</label>
        <input type="number" id="new-reps" value="10">
      </div>
    </div>
    <button class="btn" onclick="addExercise()">Hinzufügen</button>
    <div style="height:10px;"></div>
    <button class="btn secondary" onclick="closeSheet('add-exercise')">Abbrechen</button>
  </div>
</div>

<!-- SHEET: LOG SET -->
<div class="overlay" id="sheet-log-set" onclick="closeSheetOnBg(event, 'log-set')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="log-set-title">Satz eintragen</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Satz #</label>
        <input type="number" id="log-set-num" readonly style="opacity:0.5;">
      </div>
      <div class="form-group">
        <label>Gewicht (kg)</label>
        <input type="number" id="log-weight" step="2.5">
      </div>
      <div class="form-group">
        <label>Wdh</label>
        <input type="number" id="log-reps">
      </div>
    </div>
    <button class="btn" onclick="confirmSet()">Satz bestätigen ✓</button>
    <div style="height:10px;"></div>
    <button class="btn secondary" onclick="closeSheet('log-set')">Abbrechen</button>
  </div>
</div>

<script>
const DEFAULT_EXERCISES = [
  { id: 'e1', name: 'Shoulder Press', hint: 'Sitz: 2', sets: 3, weight: 17.5, reps: 10 },
  { id: 'e2', name: 'Schräge Beinpresse', hint: '', sets: 3, weight: 20, reps: 10 },
  { id: 'e3', name: 'Abdominal Flexion', hint: 'Hebel: 12', sets: 3, weight: 22.5, reps: 10 },
  { id: 'e4', name: 'Back Extension', hint: 'Hebel: 4 · Rückenpolster: 5', sets: 3, weight: 35, reps: 10 },
  { id: 'e5', name: 'Lat-Zug', hint: 'Sitz: 12 · Beinpolster: 1', sets: 3, weight: 27.5, reps: 10 },
];

let exercises = JSON.parse(localStorage.getItem('exercises') || 'null') || DEFAULT_EXERCISES;
let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
let currentSession = {}; // { exerciseId: [ {set, weight, reps}, ... ] }
let pendingLog = null; // { exId, setIndex, defaultWeight, defaultReps }

function save() {
  localStorage.setItem('exercises', JSON.stringify(exercises));
  localStorage.setItem('sessions', JSON.stringify(sessions));
}

function today() {
  return new Date().toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'2-digit' });
}

function todayISO() { return new Date().toISOString().slice(0,10); }

// RENDER TRAINING VIEW
function renderTraining() {
  document.getElementById('today-badge').textContent = today();
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';

  exercises.forEach(ex => {
    const loggedSets = currentSession[ex.id] || [];
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-title">${ex.name}</div>
          ${ex.hint ? `<div class="card-sub">${ex.hint}</div>` : ''}
        </div>
        <span class="tag">${ex.sets}×${ex.reps} · ${ex.weight}kg</span>
      </div>
      <div class="exercise-item">
        <div class="sets-row" id="sets-${ex.id}"></div>
      </div>
    `;
    list.appendChild(div);

    const row = document.getElementById(`sets-${ex.id}`);
    for (let i = 0; i < ex.sets; i++) {
      const logged = loggedSets[i];
      const chip = document.createElement('div');
      chip.className = `set-chip${logged ? ' done' : ''}`;
      chip.innerHTML = logged
        ? `<span class="check">✓</span> ${logged.weight}kg × ${logged.reps}`
        : `Satz ${i+1}`;
      chip.onclick = () => openLogSet(ex, i);
      row.appendChild(chip);
    }
  });
}

function openLogSet(ex, setIndex) {
  pendingLog = { exId: ex.id, setIndex };
  const logged = (currentSession[ex.id] || [])[setIndex];
  document.getElementById('log-set-title').textContent = `${ex.name} – Satz ${setIndex + 1}`;
  document.getElementById('log-set-num').value = setIndex + 1;
  document.getElementById('log-weight').value = logged ? logged.weight : ex.weight;
  document.getElementById('log-reps').value = logged ? logged.reps : ex.reps;
  showSheet('log-set');
}

function confirmSet() {
  if (!pendingLog) return;
  const { exId, setIndex } = pendingLog;
  const weight = parseFloat(document.getElementById('log-weight').value);
  const reps = parseInt(document.getElementById('log-reps').value);
  if (!currentSession[exId]) currentSession[exId] = [];
  currentSession[exId][setIndex] = { set: setIndex + 1, weight, reps };
  closeSheet('log-set');
  renderTraining();
}

function saveSession() {
  const keys = Object.keys(currentSession);
  if (keys.length === 0) { alert('Noch keine Sätze eingetragen.'); return; }
  const session = {
    date: todayISO(),
    displayDate: today(),
    data: JSON.parse(JSON.stringify(currentSession))
  };
  sessions.unshift(session);
  save();
  currentSession = {};
  renderTraining();
  alert('Training gespeichert! 💪');
}

// RENDER HISTORY
function renderHistory() {
  const el = document.getElementById('history-list');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="empty"><div class="icon">📋</div>Noch kein Training gespeichert.</div>';
    return;
  }
  el.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'card';
    let lines = '';
    let totalVol = 0;
    Object.keys(s.data).forEach(exId => {
      const ex = exercises.find(e => e.id === exId);
      const name = ex ? ex.name : exId;
      const sets = s.data[exId].filter(Boolean);
      const summary = sets.map(st => `${st.weight}kg×${st.reps}`).join(' · ');
      lines += `<div>${name}: ${summary}</div>`;
      sets.forEach(st => { totalVol += st.weight * st.reps; });
    });
    div.innerHTML = `
      <div class="card-header">
        <div class="card-sub">${s.displayDate}</div>
        <div class="history-volume">Vol: ${totalVol.toFixed(0)} kg</div>
      </div>
      <div class="history-item">
        <div class="history-exercises">${lines}</div>
      </div>
    `;
    el.appendChild(div);
  });
}

// RENDER PROGRESS
function renderProgress() {
  const el = document.getElementById('progress-content');
  if (sessions.length < 2) {
    el.innerHTML = '<div class="empty"><div class="icon">📈</div>Mindestens 2 Trainings nötig für Fortschritt.</div>';
    return;
  }

  // For each exercise, find max weight logged
  const maxByEx = {};
  sessions.forEach(s => {
    Object.keys(s.data).forEach(exId => {
      const sets = s.data[exId].filter(Boolean);
      sets.forEach(st => {
        if (!maxByEx[exId] || st.weight > maxByEx[exId]) maxByEx[exId] = st.weight;
      });
    });
  });

  const globalMax = Math.max(...Object.values(maxByEx), 1);
  el.innerHTML = '<div class="section-title">Max. Gewicht pro Übung</div>';
  const card = document.createElement('div');
  card.className = 'card';
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';

  Object.keys(maxByEx).forEach(exId => {
    const ex = exercises.find(e => e.id === exId);
    const name = ex ? ex.name : exId;
    const val = maxByEx[exId];
    const pct = (val / globalMax * 100).toFixed(0);
    wrap.innerHTML += `
      <div class="chart-bar-row">
        <div class="chart-label">${name.split(' ')[0]}</div>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${pct}%"></div></div>
        <div class="chart-val">${val}kg</div>
      </div>
    `;
  });
  card.appendChild(wrap);
  el.appendChild(card);

  // Volume per session
  el.innerHTML += '<div class="section-title">Volumen je Training</div>';
  const vcard = document.createElement('div');
  vcard.className = 'card';
  const vwrap = document.createElement('div');
  vwrap.className = 'chart-wrap';
  const vols = sessions.map(s => {
    let v = 0;
    Object.values(s.data).forEach(sets => sets.filter(Boolean).forEach(st => v += st.weight * st.reps));
    return { date: s.displayDate, vol: v };
  }).reverse();
  const maxVol = Math.max(...vols.map(v => v.vol), 1);
  vols.forEach(v => {
    const pct = (v.vol / maxVol * 100).toFixed(0);
    vwrap.innerHTML += `
      <div class="chart-bar-row">
        <div class="chart-label">${v.date.slice(0,6)}</div>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${pct}%"></div></div>
        <div class="chart-val">${v.vol.toFixed(0)}</div>
      </div>
    `;
  });
  vcard.appendChild(vwrap);
  el.appendChild(vcard);
}

// RENDER SETTINGS
function renderSettings() {
  const el = document.getElementById('settings-list');
  el.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card';
  exercises.forEach(ex => {
    const row = document.createElement('div');
    row.className = 'exercise-item';
    row.style.display = 'flex';
    row.style.alignItems = 'center';
    row.style.justifyContent = 'space-between';
    row.innerHTML = `
      <div>
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-hint">${ex.hint || '—'} · ${ex.sets}×${ex.reps} · ${ex.weight}kg</div>
      </div>
      <button class="del-btn" onclick="deleteExercise('${ex.id}')">✕</button>
    `;
    card.appendChild(row);
  });
  el.appendChild(card);
}

function addExercise() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const ex = {
    id: 'e' + Date.now(),
    name,
    hint: document.getElementById('new-hint').value.trim(),
    sets: parseInt(document.getElementById('new-sets').value) || 3,
    weight: parseFloat(document.getElementById('new-weight').value) || 0,
    reps: parseInt(document.getElementById('new-reps').value) || 10,
  };
  exercises.push(ex);
  save();
  closeSheet('add-exercise');
  renderTraining();
  renderSettings();
  document.getElementById('new-name').value = '';
  document.getElementById('new-hint').value = '';
}

function deleteExercise(id) {
  if (!confirm('Übung löschen?')) return;
  exercises = exercises.filter(e => e.id !== id);
  save();
  renderSettings();
  renderTraining();
}

// NAVIGATION
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'progress') renderProgress();
  if (name === 'settings') renderSettings();
}

// SHEETS
function showSheet(name) {
  document.getElementById('sheet-' + name).classList.add('open');
}
function closeSheet(name) {
  document.getElementById('sheet-' + name).classList.remove('open');
}
function closeSheetOnBg(e, name) {
  if (e.target === e.currentTarget) closeSheet(name);
}

// INIT
renderTraining();
</script>
</body>
</html>
